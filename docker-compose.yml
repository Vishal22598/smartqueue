version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: smartqueue-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  redis:
    image: redis:7-alpine
    container_name: smartqueue-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mysql:
    image: mysql:8
    container_name: smartqueue-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: smartqueue_db
      MYSQL_USER: smartqueue
      MYSQL_PASSWORD: smart123
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  rabbitmq_data:
  redis_data:
  mysql_data: